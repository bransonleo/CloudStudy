AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  CloudStudy Application Stack: ALB, Auto Scaling Group with Launch Template,
  CloudWatch scaling alarms. Imports networking from cloudstudy-network stack.
  RDS, S3, and Cognito are pre-existing resources passed in as parameters.

Parameters:
  EnvironmentName:
    Type: String
    Default: CloudStudy

  # --- Pre-existing resources ---
  RdsHost:
    Type: String
    Description: Existing RDS MySQL endpoint address
    Default: cloudstudy-db.cr2c60uy621h.us-east-1.rds.amazonaws.com

  RdsPassword:
    Type: String
    NoEcho: true
    Description: Master password for existing RDS MySQL instance
    MinLength: 8

  S3BucketName:
    Type: String
    Description: Existing S3 bucket name for file uploads
    Default: cloudstudy-uploads

  CognitoUserPoolId:
    Type: String
    Description: Existing Cognito User Pool ID
    Default: us-east-1_Ss7jHFZSC

  CognitoClientId:
    Type: String
    Description: Existing Cognito App Client ID
    Default: 7oiatn9dtru73j9vrl08896fv4

  CognitoDomain:
    Type: String
    Description: Cognito Hosted UI domain URL (e.g. https://<prefix>.auth.us-east-1.amazoncognito.com)
    Default: https://us-east-1ss7jhfzsc.auth.us-east-1.amazoncognito.com

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t2.small, t3.micro]

  KeyPairName:
    Type: String
    Default: vockey

Resources:
  # ============ ALB ============
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue CloudStudy-PublicSubnet1Id
        - !ImportValue CloudStudy-PublicSubnet2Id
      SecurityGroups:
        - !ImportValue CloudStudy-ALBSecurityGroupId
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "120"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-tg"
      Protocol: HTTP
      Port: 80
      VpcId: !ImportValue CloudStudy-VPCId
      TargetType: instance
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-tg"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ============ LAUNCH TEMPLATE ============
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentName}-lt"
      LaunchTemplateData:
        ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - !ImportValue CloudStudy-EC2SecurityGroupId
        UserData:
          Fn::Base64:
            !Sub
              - |
                #!/bin/bash -x

                # Signal CloudFormation on exit (success or failure).
                # aws-cfn-bootstrap is not in AL2023 dnf repos; installed via pip below.
                EXIT_CODE=1
                trap '/usr/local/bin/cfn-signal -e $EXIT_CODE \
                  --stack ${AWS::StackName} \
                  --resource AutoScalingGroup \
                  --region ${AWS::Region} 2>/dev/null || true' EXIT

                set -e

                # 1. System packages
                dnf install -y python3.11 python3.11-pip nginx git

                # 2. Install cfn-bootstrap (provides cfn-signal at /usr/local/bin/)
                python3.11 -m pip install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz

                # 3. Clone the repo
                git clone --depth 1 https://github.com/bransonleo/CloudStudy.git /opt/cloudstudy

                # 4. Pull pre-built frontend from S3 (built locally/CI, ~5 s vs ~15 min on t2.micro)
                aws s3 sync s3://${S3BucketName}/frontend/ /usr/share/nginx/html/

                # 5. Configure nginx
                rm -f /etc/nginx/conf.d/default.conf
                cat > /etc/nginx/conf.d/cloudstudy.conf << 'NGINX'
                server {
                    listen 80;

                    location /api/ {
                        proxy_pass http://127.0.0.1:5000;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_read_timeout 120s;
                        proxy_connect_timeout 10s;
                        proxy_send_timeout 120s;
                    }

                    location / {
                        root /usr/share/nginx/html;
                        try_files $uri $uri/ /index.html;
                    }
                }
                NGINX
                systemctl enable nginx && systemctl start nginx

                # 6. Install backend
                cd /opt/cloudstudy/backend
                python3.11 -m pip install -r requirements.txt

                # 7. Write .env
                FLASK_SECRET=$(python3.11 -c "import secrets; print(secrets.token_hex(32))")
                cat > .env << ENV
                FLASK_ENV=production
                FLASK_PORT=5000
                FLASK_SECRET_KEY=$FLASK_SECRET
                AWS_REGION=us-east-1
                S3_BUCKET_NAME=${S3BucketName}
                RDS_HOST=${RdsHost}
                RDS_PORT=3306
                RDS_DATABASE=cloudstudy
                RDS_USERNAME=admin
                RDS_PASSWORD=${RdsPassword}
                GEMINI_API_KEY=${GeminiApiKey}
                COGNITO_USER_POOL_ID=${CognitoUserPoolId}
                COGNITO_CLIENT_ID=${CognitoClientId}
                COGNITO_REGION=us-east-1
                ENV

                # 8. Create gunicorn systemd service
                cat > /etc/systemd/system/cloudstudy.service << 'SERVICE'
                [Unit]
                Description=CloudStudy Gunicorn
                After=network.target

                [Service]
                WorkingDirectory=/opt/cloudstudy/backend
                ExecStart=/usr/local/bin/gunicorn --bind 127.0.0.1:5000 --workers 2 --timeout 120 run:app
                Restart=always
                RestartSec=3

                [Install]
                WantedBy=multi-user.target
                SERVICE
                systemctl daemon-reload
                systemctl enable cloudstudy && systemctl start cloudstudy

                # 9. Signal success (trap on EXIT handles failure case)
                EXIT_CODE=0
              - S3BucketName: !Ref S3BucketName
                RdsHost: !Ref RdsHost
                RdsPassword: !Ref RdsPassword
                GeminiApiKey: !Ref GeminiApiKey
                CognitoUserPoolId: !Ref CognitoUserPoolId
                CognitoClientId: !Ref CognitoClientId

  # ============ AUTO SCALING GROUP ============
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT15M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MaxBatchSize: 1
        MinInstancesInService: 1
        PauseTime: PT15M
        WaitOnResourceSignals: true
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentName}-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      DesiredCapacity: 2
      MaxSize: 4
      VPCZoneIdentifier:
        - !ImportValue CloudStudy-PrivateSubnet1Id
        - !ImportValue CloudStudy-PrivateSubnet2Id
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ec2"
          PropagateAtLaunch: true

  # ============ SCALING POLICIES ============
  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 120

  ScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 120

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale out when CPU > 60% for 2 minutes
      AlarmName: !Sub "${EnvironmentName}-high-cpu"
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 60
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleOutPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

  LowCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale in when CPU < 30% for 5 minutes
      AlarmName: !Sub "${EnvironmentName}-low-cpu"
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 30
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleInPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

Outputs:
  ALBEndpoint:
    Description: Application URL
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"

  RDSEndpoint:
    Description: RDS MySQL endpoint (pre-existing)
    Value: !Ref RdsHost

  CognitoUserPoolId:
    Description: Cognito User Pool ID (pre-existing)
    Value: !Ref CognitoUserPoolId

  CognitoClientId:
    Description: Cognito App Client ID (pre-existing)
    Value: !Ref CognitoClientId

  S3BucketName:
    Description: S3 bucket for file uploads (pre-existing)
    Value: !Ref S3BucketName
