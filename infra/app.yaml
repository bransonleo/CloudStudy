AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  CloudStudy Application Stack: RDS MySQL, S3, Cognito, ALB, Auto Scaling Group
  with Launch Template. Imports networking from cloudstudy-network stack.

Parameters:
  EnvironmentName:
    Type: String
    Default: CloudStudy

  RdsPassword:
    Type: String
    NoEcho: true
    Description: Master password for RDS MySQL
    MinLength: 8

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t2.small, t3.micro]

  KeyPairName:
    Type: String
    Default: vockey

Resources:
  # ============ RDS ============
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - !ImportValue CloudStudy-PrivateSubnet1Id
        - !ImportValue CloudStudy-PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-db-subnet-group"

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentName}-db"
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      DBName: cloudstudy
      MasterUsername: admin
      MasterUserPassword: !Ref RdsPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !ImportValue CloudStudy-RDSSecurityGroupId
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-rds"

  # ============ S3 ============
  CloudStudyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: cloudstudy-uploads
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-uploads"

  # ============ COGNITO ============
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${EnvironmentName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CognitoAppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${EnvironmentName}-web"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub
          - "http://${ALBDns}/api/auth/callback"
          - ALBDns: !GetAtt ApplicationLoadBalancer.DNSName
      LogoutURLs:
        - !Sub
          - "http://${ALBDns}"
          - ALBDns: !GetAtt ApplicationLoadBalancer.DNSName

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: cloudstudy-team10
      UserPoolId: !Ref CognitoUserPool

  # ============ ALB ============
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue CloudStudy-PublicSubnet1Id
        - !ImportValue CloudStudy-PublicSubnet2Id
      SecurityGroups:
        - !ImportValue CloudStudy-ALBSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-tg"
      Protocol: HTTP
      Port: 80
      VpcId: !ImportValue CloudStudy-VPCId
      TargetType: instance
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-tg"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ============ LAUNCH TEMPLATE ============
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentName}-lt"
      LaunchTemplateData:
        ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - !ImportValue CloudStudy-EC2SecurityGroupId
        UserData:
          Fn::Base64:
            !Sub
              - |
                #!/bin/bash -xe

                # 1. System packages
                dnf install -y python3.11 python3.11-pip nginx git nodejs npm

                # 2. Clone the repo
                git clone https://github.com/bransonleo/CloudStudy.git /opt/cloudstudy

                # 3. Build frontend
                cd /opt/cloudstudy/frontend
                npm install
                npm run build

                # 4. Serve frontend via nginx
                cp -r dist/* /usr/share/nginx/html/

                # 5. Configure nginx
                rm -f /etc/nginx/conf.d/default.conf
                cat > /etc/nginx/conf.d/cloudstudy.conf << 'NGINX'
                server {
                    listen 80;

                    location /api/ {
                        proxy_pass http://127.0.0.1:5000;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    }

                    location / {
                        root /usr/share/nginx/html;
                        try_files $uri $uri/ /index.html;
                    }
                }
                NGINX
                systemctl enable nginx && systemctl start nginx

                # 6. Install backend
                cd /opt/cloudstudy/backend
                python3.11 -m pip install -r requirements.txt

                # 7. Write .env
                FLASK_SECRET=$(python3.11 -c "import secrets; print(secrets.token_hex(32))")
                cat > .env << ENV
                FLASK_ENV=production
                FLASK_PORT=5000
                FLASK_SECRET_KEY=$FLASK_SECRET
                AWS_REGION=us-east-1
                S3_BUCKET_NAME=${S3BucketName}
                RDS_HOST=${RDSEndpoint}
                RDS_PORT=3306
                RDS_DATABASE=cloudstudy
                RDS_USERNAME=admin
                RDS_PASSWORD=${RdsPassword}
                GEMINI_API_KEY=${GeminiApiKey}
                COGNITO_USER_POOL_ID=${CognitoUserPoolId}
                COGNITO_CLIENT_ID=${CognitoClientId}
                COGNITO_REGION=us-east-1
                ENV

                # 8. Create gunicorn systemd service
                cat > /etc/systemd/system/cloudstudy.service << 'SERVICE'
                [Unit]
                Description=CloudStudy Gunicorn
                After=network.target

                [Service]
                WorkingDirectory=/opt/cloudstudy/backend
                ExecStart=/usr/local/bin/gunicorn --bind 127.0.0.1:5000 --workers 2 run:app
                Restart=always
                RestartSec=3

                [Install]
                WantedBy=multi-user.target
                SERVICE
                systemctl daemon-reload
                systemctl enable cloudstudy && systemctl start cloudstudy

                # 9. Signal CloudFormation
                /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource AutoScalingGroup --region ${AWS::Region}
              - S3BucketName: !Ref CloudStudyBucket
                RDSEndpoint: !GetAtt RDSInstance.Endpoint.Address
                RdsPassword: !Ref RdsPassword
                GeminiApiKey: !Ref GeminiApiKey
                CognitoUserPoolId: !Ref CognitoUserPool
                CognitoClientId: !Ref CognitoAppClient

  # ============ AUTO SCALING GROUP ============
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MaxBatchSize: 1
        MinInstancesInService: 1
        PauseTime: PT10M
        WaitOnResourceSignals: true
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentName}-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      DesiredCapacity: 2
      MaxSize: 4
      VPCZoneIdentifier:
        - !ImportValue CloudStudy-PrivateSubnet1Id
        - !ImportValue CloudStudy-PrivateSubnet2Id
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ec2"
          PropagateAtLaunch: true

  # ============ SCALING POLICIES ============
  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 120

  ScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 120

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale out when CPU > 60% for 2 minutes
      AlarmName: !Sub "${EnvironmentName}-high-cpu"
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 60
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleOutPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

  LowCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale in when CPU < 30% for 5 minutes
      AlarmName: !Sub "${EnvironmentName}-low-cpu"
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 30
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleInPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

Outputs:
  ALBEndpoint:
    Description: Application URL
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"

  RDSEndpoint:
    Description: RDS MySQL endpoint address
    Value: !GetAtt RDSInstance.Endpoint.Address

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoAppClient

  CognitoHostedUIUrl:
    Description: Cognito Hosted UI login URL
    Value: !Sub
      - "https://${Domain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${ClientId}&response_type=code&scope=openid+email+profile&redirect_uri=http://${ALBDns}/api/auth/callback"
      - Domain: !Ref CognitoUserPoolDomain
        ClientId: !Ref CognitoAppClient
        ALBDns: !GetAtt ApplicationLoadBalancer.DNSName

  S3BucketName:
    Description: S3 bucket for file uploads
    Value: !Ref CloudStudyBucket
